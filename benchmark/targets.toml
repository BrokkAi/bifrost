warmup_iterations = 1
measured_iterations = 3
output_dir = "benchmark-output"
repo_cache_dir = "target/benchmark-repos"
required_languages = [
  "java",
  "go",
  "cpp",
  "javascript",
  "typescript",
  "python",
  "rust",
  "php",
  "scala",
  "csharp",
]
required_scenarios = [
  "workspace_build",
  "search_symbols",
  "get_symbol_locations",
  "get_summaries",
  "most_relevant_files",
  "scan_usages",
]

