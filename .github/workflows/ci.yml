name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --check

  rust:
    name: rust (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    env:
      RUSTFLAGS: ${{ matrix.rustflags }}
      ANDROID_API: '21'
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_PROFILE_TEST_DEBUG: 0
    strategy:
      fail-fast: false
      matrix:
        # Temporary diagnostic matrix for the Windows dead_code_smells flake in PR #723.
        # Restore the full platform matrix before merging.
        include:
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            rustflags: ''
            cargo-flags: '--features nlp'
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android NDK
        if: matrix.target == 'aarch64-linux-android'
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27d
          add-to-path: false

      - name: Configure Android toolchain
        if: matrix.target == 'aarch64-linux-android'
        shell: bash
        run: |
          toolchain_bin="${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          api="${ANDROID_API}"
          {
            echo "CC_aarch64_linux_android=${toolchain_bin}/aarch64-linux-android${api}-clang"
            echo "CXX_aarch64_linux_android=${toolchain_bin}/aarch64-linux-android${api}-clang++"
            echo "AR_aarch64_linux_android=${toolchain_bin}/llvm-ar"
            echo "RANLIB_aarch64_linux_android=${toolchain_bin}/llvm-ranlib"
            echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${toolchain_bin}/aarch64-linux-android${api}-clang"
          } >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          targets: ${{ matrix.target }}

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'

      - name: Reproduce Windows dead-code benchmark flake
        shell: pwsh
        run: |
          1..10 | ForEach-Object {
            Write-Host "Diagnostic iteration $_ of 10"
            cargo test --target ${{ matrix.target }} ${{ matrix.cargo-flags }} --test bifrost_benchmark_run run_subcommand_executes_all_configured_scenarios_on_local_repo -- --exact
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

  python:
    name: python (${{ matrix.target }})
    # Temporarily skip unrelated Python validation while reproducing PR #723's Windows Rust flake.
    if: ${{ false }}
    needs: rust
    runs-on: ${{ matrix.runner }}
    env:
      RUSTFLAGS: ${{ matrix.rustflags }}
    strategy:
      fail-fast: false
      matrix:
        # Temporary diagnostic matrix for the Windows dead_code_smells flake in PR #723.
        # Restore the full platform matrix before merging.
        include:
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            rustflags: ''
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.0
          targets: ${{ matrix.target }}

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          key: python-${{ matrix.target }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'

      - name: Run python tests
        run: bash scripts/test_python.sh
