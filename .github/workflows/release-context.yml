name: Release context

on:
  workflow_call:
    inputs:
      tag:
        description: Release tag or fully qualified tag ref to validate
        required: true
        type: string
    outputs:
      tag:
        description: Normalized v-prefixed release tag
        value: ${{ jobs.validate.outputs.tag }}
      version:
        description: Validated Cargo package version
        value: ${{ jobs.validate.outputs.version }}

permissions:
  contents: read

jobs:
  validate:
    name: validate release context
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
        with:
          persist-credentials: false
          ref: ${{ inputs.tag }}

      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 22
          package-manager-cache: false

      - name: Validate release version and metadata
        id: release
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: >
          node scripts/release-version.mjs check
          --tag "$RELEASE_TAG"
          --github-output "$GITHUB_OUTPUT"
