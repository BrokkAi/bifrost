name: Publish crate

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.4.0). Must already exist.'
        required: true
        type: string
      dry_run:
        description: 'Run cargo publish --dry-run only'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  release-context:
    name: validate release context
    uses: ./.github/workflows/release-context.yml
    with:
      tag: ${{ inputs.tag || github.ref_name }}
    permissions:
      contents: read

  publish:
    name: cargo publish
    needs: release-context
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
        with:
          persist-credentials: false
          ref: ${{ needs.release-context.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable

      - name: Authenticate to crates.io (trusted publishing)
        id: auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      - name: Publish (dry run)
        if: ${{ inputs.dry_run }}
        run: cargo publish --dry-run
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Publish
        if: ${{ !inputs.dry_run }}
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
